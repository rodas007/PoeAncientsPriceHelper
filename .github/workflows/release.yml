name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore PoeAncientsPriceHelper.sln

      - name: Build
        run: dotnet publish src/PoeAncientsPriceHelper/PoeAncientsPriceHelper.csproj -c Release -r win-x64 --self-contained false -o publish

      - name: Package
        shell: pwsh
        run: |
          Compress-Archive -Path publish/* -DestinationPath PoeAncientsPriceHelper-${{ github.ref_name }}.zip

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: PoeAncientsPriceHelper-${{ github.ref_name }}.zip
          generate_release_notes: true
